<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanweer HTML Viewer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.svg" />
    <meta name="theme-color" content="#5b5ef7" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var saved = localStorage.getItem('tanweer-html-viewer-theme');
        var dark = saved === 'dark' || (!saved && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="brand">
          <span class="brand-mark"></span>
          <span class="brand-name">Tanweer HTML Viewer</span>
        </div>
        <div class="header-actions">
          <p class="tagline">Write · Preview · Export</p>
          <button
            class="btn-theme"
            id="theme-toggle"
            type="button"
            aria-label="Switch to dark mode"
            title="Toggle theme"
          >
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace" id="workspace">
        <section class="panel panel-code" id="panel-code">
          <div class="panel-header">
            <span class="panel-label">Code</span>
            <span class="lint-status" id="lint-status"></span>
          </div>
          <div class="editor-wrap" id="editor"></div>
        </section>

        <div
          class="divider"
          id="divider"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize panels"
          tabindex="0"
        ></div>

        <section class="panel panel-preview" id="panel-preview">
          <div class="panel-header">
            <span class="panel-label">Preview</span>
            <button class="btn-download" id="download-pdf" type="button">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Download PDF
            </button>
          </div>
          <div class="preview-wrap">
            <iframe
              id="preview-frame"
              title="HTML Preview"
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            ></iframe>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
